<!DOCTYPE html>
<html lang="en">
<head>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Insights | gRaviTy Research</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@200;300;400;500;600&display=swap');
        :root { --gold: #d4af37; --bg-black: #050505; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-black); color: #fff; user-select: none; overflow-x: hidden; }
        
        .nav { 
            padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .nav img { height: 45px; }
        .home-btn { color: var(--gold); text-decoration: none; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; border: 1px solid var(--gold); padding: 8px 15px; transition: 0.3s; }
        .home-btn:hover { background: var(--gold); color: #000; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        
        .insight-card { 
            background: rgba(15,15,15,0.7); border: 1px solid rgba(255,255,255,0.05); 
            padding: 25px; margin-bottom: 20px; transition: 0.4s; overflow: hidden;
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .company-name { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); }

        .arrow { font-size: 18px; color: var(--gold); transition: 0.4s; transform: rotate(0deg); }
        .insight-card.active .arrow { transform: rotate(180deg); }

        /* --- THE DROPDOWN SECTION --- */
        .details-pane { 
            max-height: 0; opacity: 0; overflow: hidden; 
            transition: all 0.5s ease; margin-top: 0; 
        }
        .insight-card.active .details-pane { 
            max-height: 800px; opacity: 1; margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);
        }

        .chart-frame { width: 100%; height: 400px; background: #000; margin-bottom: 20px; border: 1px solid #222; }
        
        .ai-note { color: #00ff88; font-size: 13px; font-style: italic; margin-bottom: 15px; display: block; background: rgba(0,255,136,0.05); padding: 10px; border-left: 2px solid #00ff88; }
        .analysis-text { color: #888; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="nav">
    <a href="index.html" class="home-btn">← Home</a>
    <img src="logo.png" alt="Logo">
    <div style="width:70px"></div>
</div>

<div class="container" id="terminal-feed">
    <div style="text-align: center; color: var(--gold); margin-top: 100px; letter-spacing: 3px;">CONNECTING TO GLOBAL DATA STREAM...</div>
</div>

<script>
    async function loadTerminal() {
        const URL = 'https://api.sheety.co/27bb86a119d2050ea00da106b6e33003/gRaviTyResearchTerminal/sheet1';
        try {
            const res = await fetch(URL);
            const json = await res.json();
            buildUI(json.sheet1);
        } catch (e) { console.error("OFFLINE"); }
    }

    function buildUI(data) {
        const feed = document.getElementById('terminal-feed');
        feed.innerHTML = '';

        data.forEach((item, index) => {
            const change = (parseFloat(item.change) * 100).toFixed(2);
            const isUp = change >= 0;
            const color = isUp ? '#00ff88' : '#ff4444';
            const cardId = `card-${index}`;
            const containerId = `tv-chart-${index}`;

            const card = document.createElement('div');
            card.className = 'insight-card';
            card.id = cardId;
            card.innerHTML = `
                <div class="card-header" onclick="togglePulse('${cardId}', '${item.ticker}', '${containerId}')">
                    <div>
                        <div class="company-name">${item.company}</div>
                        <div style="font-size: 10px; color: #444; letter-spacing: 1px;">${item.ticker} | SECTOR: ${item.sector || 'GENERAL'}</div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <div style="text-align: right; margin-right: 15px;">
                            <div style="font-size: 18px;">₹${item.price.toLocaleString('en-IN')}</div>
                            <div style="color: ${color}; font-size: 11px;">${isUp ? '▲' : '▼'} ${change}%</div>
                        </div>
                        <div class="arrow">▾</div>
                    </div>
                </div>

                <div class="details-pane">
                    <span class="ai-note">TERMINAL PULSE: "${item.verdict}"</span>
                    
                    <div class="chart-frame" id="${containerId}"></div>

                    <div class="analysis-text">${item.analysis}</div>
                </div>
            `;
            feed.appendChild(card);
        });
    }

    function togglePulse(cardId, ticker, containerId) {
        const card = document.getElementById(cardId);
        const isOpen = card.classList.contains('active');
        
        // Close others if you want only one open at a time (Optional)
        // document.querySelectorAll('.insight-card').forEach(c => c.classList.remove('active'));

        if (!isOpen) {
            card.classList.add('active');
            loadTradingView(ticker, containerId);
        } else {
            card.classList.remove('active');
        }
    }

    function loadTradingView(ticker, containerId) {
    const container = document.getElementById(containerId);
    if (container.innerHTML !== "") return; 

    // Creating the widget using the TradingView Library
    new TradingView.widget({
        "autosize": true,
        "symbol": ticker,
        "interval": "D",
        "timezone": "Asia/Kolkata",
        "theme": "dark",
        "style": "3", // Area style
        "locale": "in",
        "toolbar_bg": "#f1f3f6",
        "enable_publishing": false,
        "hide_top_toolbar": true,
        "hide_legend": true,
        "save_image": false,
        "container_id": containerId,
        "backgroundColor": "rgba(0, 0, 0, 1)",
        "gridColor": "rgba(0, 0, 0, 0.06)",
        "lineColor": "#d4af37",
        "topColor": "rgba(212, 175, 55, 0.1)",
        "bottomColor": "rgba(212, 175, 55, 0)",
    });
}
    loadTerminal();
</script>
</body>
</html>
