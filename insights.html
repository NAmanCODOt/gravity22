<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Insights | gRaviTy Research</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@200;300;400;500;600&display=swap');
        :root { --gold: #d4af37; --bg-black: #050505; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-black); color: #fff; user-select: none; }
        
        /* --- NAVIGATION --- */
        .nav { 
            padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .nav img { height: 45px; }
        .home-btn { color: var(--gold); text-decoration: none; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; border: 1px solid var(--gold); padding: 8px 15px; transition: 0.3s; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        
        /* --- CARD STYLING --- */
        .insight-card { 
            background: rgba(15,15,15,0.7); border: 1px solid rgba(255,255,255,0.05); 
            padding: 30px; margin-bottom: 25px; transition: 0.4s; position: relative;
        }

        .card-main { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .company-name { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); }

        /* --- THE ARROW --- */
        .drop-arrow { 
            font-size: 18px; color: var(--gold); transition: 0.4s; 
            transform: rotate(0deg); margin-left: 20px;
        }
        .insight-card.active .drop-arrow { transform: rotate(180deg); }

        /* --- HIDDEN GRAPH SECTION --- */
        .graph-section { 
            max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0, 1, 0, 1); 
            border-top: 1px solid rgba(255,255,255,0); margin-top: 0;
        }
        .insight-card.active .graph-section { 
            max-height: 1000px; transition: max-height 1s ease-in-out;
            border-top: 1px solid rgba(255,255,255,0.05); margin-top: 20px; padding-top: 20px;
        }

        .ai-verdict { color: #00ff88; font-size: 13px; font-style: italic; margin-bottom: 15px; display: block; }
        .chart-box { width: 100%; height: 180px; margin-bottom: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="nav">
    <a href="index.html" class="home-btn">← Home</a>
    <img src="logo.png" alt="Logo">
    <div style="width:70px"></div>
</div>

<div class="container">
    <div id="insights-container">
        <div style="text-align: center; color: var(--gold); margin-top: 100px;">CONNECTING TO DATA STREAM...</div>
    </div>
</div>

<script>
    async function fetchTerminalData() {
        const URL = 'https://api.sheety.co/27bb86a119d2050ea00da106b6e33003/gRaviTyResearchTerminal/sheet1';
        try {
            const res = await fetch(URL);
            const json = await res.json();
            render(json.sheet1);
        } catch (e) { console.error("Sync Failed"); }
    }

    function render(data) {
        const container = document.getElementById('insights-container');
        container.innerHTML = '';

        data.forEach((item, index) => {
            const change = (parseFloat(item.change) * 100).toFixed(2);
            const color = change >= 0 ? '#00ff88' : '#ff4444';
            
            const card = document.createElement('div');
            card.className = 'insight-card';
            card.innerHTML = `
                <div class="card-main" onclick="toggleCard(this)">
                    <div>
                        <div class="company-name">${item.company}</div>
                        <div style="font-size: 11px; color: #555;">${item.ticker} | CLASS: ASSET</div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <div style="text-align: right;">
                            <div style="font-size: 18px;">₹${item.price.toLocaleString('en-IN')}</div>
                            <div style="color: ${color}; font-size: 11px;">${change >= 0 ? '▲' : '▼'} ${change}%</div>
                        </div>
                        <div class="drop-arrow">▾</div>
                    </div>
                </div>

                <div class="graph-section">
                    <span class="ai-verdict">AI INSIGHT: "${item.verdict}"</span>
                    <div class="chart-box">
                        <canvas id="chart-${index}"></canvas>
                    </div>
                    <p style="color: #888; font-size: 14px; line-height: 1.6;">${item.analysis}</p>
                </div>
            `;
            container.appendChild(card);
            
            // Generate a random "fake" graph for each stock
            createSimpleChart(`chart-${index}`, change >= 0);
        });
    }

    function toggleCard(el) {
        el.parentElement.classList.toggle('active');
    }

    function createSimpleChart(canvasId, isUp) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        const color = isUp ? '#00ff88' : '#ff4444';
        
        // Generate 10 random points that trend up or down
        let start = 50;
        const labels = ['', '', '', '', '', '', '', '', '', ''];
        const dataPoints = labels.map(() => {
            start += (Math.random() - 0.5) * 10 + (isUp ? 2 : -2);
            return start;
        });

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: dataPoints,
                    borderColor: color,
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: isUp ? 'rgba(0, 255, 136, 0.05)' : 'rgba(255, 68, 68, 0.05)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { display: false } }
            }
        });
    }

    fetchTerminalData();
</script>
</body>
</html>
