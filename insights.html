<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Insights | gRaviTy Research</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@200;300;400;500;600&display=swap');

        :root {
            --gold: #d4af37;
            --bg-black: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-black);
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            cursor: default;
        }

        /* --- NAVIGATION --- */
        .nav {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav img { height: 45px; width: auto; }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            z-index: 10;
            position: relative;
        }

        /* --- SEARCH & FILTERS --- */
        .controls {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        #searchBar {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 15px 25px;
            color: var(--gold);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        #searchBar:focus { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #333;
            color: #888;
            padding: 8px 16px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* --- CARDS --- */
        .insight-card {
            background: rgba(15,15,15,0.7);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 40px;
            margin-bottom: 30px;
            transition: 0.4s;
            display: none; /* Controlled by JS */
        }

        .insight-card.visible { display: block; animation: fadeInUp 0.5s forwards; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }

        .company-name { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); }
        .live-price { font-size: 18px; color: #fff; }
        .analysis-content { line-height: 1.8; color: #bbb; font-size: 15px; }

        /* --- LIVE COMMENT TAG --- */
        .live-tag {
            display: inline-block;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            font-size: 9px;
            padding: 4px 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-left: 2px solid #00ff88;
        }

        .gold-orb { position: fixed; border-radius: 50%; filter: blur(140px); pointer-events: none; z-index: 1; opacity: 0.15; }
        .orb1 { width: 500px; height: 500px; background: var(--gold); top: -10%; left: -10%; }
        .orb2 { width: 400px; height: 400px; background: var(--gold); bottom: -5%; right: -5%; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<div class="nav">
    <div style="width: 22px;"></div>
    <a href="index.html"><img src="logo.png" alt="Logo"></a>
    <div style="width: 22px;"></div> 
</div>

<div class="container">
    <div class="controls">
        <input type="text" id="searchBar" placeholder="Search Company or Ticker..." onkeyup="filterInsights()">
        <div class="filter-group" id="filterGroup">
            <button class="filter-btn active" onclick="setFilter('all', this)">All Sectors</button>
            <button class="filter-btn" onclick="setFilter('tech', this)">Tech</button>
            <button class="filter-btn" onclick="setFilter('finance', this)">Finance</button>
            <button class="filter-btn" onclick="setFilter('consumer', this)">Consumer</button>
        </div>
    </div>

    <div id="insights-container">
        <div id="loader" style="text-align: center; color: var(--gold);">SYNCHRONIZING...</div>
    </div>
</div>

<script>
    let allData = [];
    let currentFilter = 'all';

    async function loadInsights() {
        const SHEETY_URL = 'https://api.sheety.co/27bb86a119d2050ea00da106b6e33003/gRaviTyResearchTerminal/sheet1'; 

        try {
            const response = await fetch(SHEETY_URL);
            const data = await response.json();
            allData = data.sheet1;
            renderCards();
        } catch (error) {
            document.getElementById('insights-container').innerHTML = "Connection Error.";
        }
    }

    function renderCards() {
        const container = document.getElementById('insights-container');
        container.innerHTML = '';
        const searchVal = document.getElementById('searchBar').value.toLowerCase();

        allData.forEach(report => {
            const isVisible = (currentFilter === 'all' || report.sector?.toLowerCase() === currentFilter) &&
                              (report.company.toLowerCase().includes(searchVal) || report.ticker.toLowerCase().includes(searchVal));

            const changeVal = (parseFloat(report.change) * 100).toFixed(2);
            const color = changeVal >= 0 ? '#00ff88' : '#ff4444';

            const card = document.createElement('div');
            card.className = `insight-card ${isVisible ? 'visible' : ''}`;
            card.innerHTML = `
                <div class="live-tag">Live Pulse: Market Momentum Active</div>
                <div class="card-header">
                    <div class="company-name">${report.company}</div>
                    <div class="price-info">
                        <span class="live-price">₹${report.price.toLocaleString('en-IN')}</span>
                        <span style="color: ${color}; font-size: 12px;">${changeVal >= 0 ? '+' : ''}${changeVal}%</span>
                    </div>
                </div>
                <div class="analysis-content">${report.analysis}</div>
            `;
            container.appendChild(card);
        });
    }

    function filterInsights() { renderCards(); }

    function setFilter(sector, btn) {
        currentFilter = sector;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCards();
    }

    loadInsights();

    // Security Lockdown
    document.onkeydown = function(e) {
        if (e.keyCode === 123 || ((e.ctrlKey || e.metaKey) && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73))) return false;
    };
</script>
</body>
</html>
