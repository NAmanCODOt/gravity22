<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us | gRaviTy Research</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');

:root
{
    --gold: #d4af37;
    --bg: #000;
}

body
{
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow-x: hidden;
}

/* ORBS */
.gold-orb
{
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    pointer-events: none;
    z-index: 0;
}

.orb1 { width: 300px; height: 300px; background: rgba(212,175,55,0.25); animation: move1 18s linear infinite; }
.orb2 { width: 250px; height: 250px; background: rgba(212,175,55,0.2); animation: move2 25s linear infinite; }
.orb3 { width: 200px; height: 200px; background: rgba(212,175,55,0.15); animation: move3 30s linear infinite; }

@keyframes move1 { 0%{top:10%;left:10%}50%{top:70%;left:80%}100%{top:10%;left:10%} }
@keyframes move2 { 0%{top:80%;left:80%}50%{top:20%;left:10%}100%{top:80%;left:80%} }
@keyframes move3 { 0%{top:50%;left:0%}50%{top:10%;left:90%}100%{top:50%;left:0%} }

/* NAV */
.nav
{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(10px);
    z-index: 1001;
}

.menu-icon span
{
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    margin: 5px 0;
    cursor: pointer;
}

/* SIDEBAR */
.sidebar
{
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: #0a0a0a;
    overflow-x: hidden;
    transition: 0.3s;
    padding-top: 80px;
    z-index: 1002;
}

.sidebar.open { width: 260px; }

.sidebar a
{
    display: block;
    padding: 14px 25px;
    color: #888;
    text-decoration: none;
}

.sidebar a:hover { color: var(--gold); }

.menu-label
{
    padding: 20px 25px 5px;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 2px;
}

.overlay
{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 1000;
}

.overlay.show
{
    opacity: 1;
    pointer-events: all;
}

/* CONTENT */
.hero
{
    text-align: center;
    padding: 120px 20px 80px;
}

.hero h1
{
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 42px;
}

.hero p
{
    max-width: 750px;
    margin: auto;
    color: #aaa;
}

/* CARDS */
.section
{
    padding: 50px 20px;
    text-align: center;
}

.card
{
    max-width: 650px;
    margin: 20px auto;
    padding: 25px;
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
}

/* BUTTON */
.btn
{
    margin-top: 30px;
    padding: 12px 25px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
}

.btn:hover
{
    background: var(--gold);
    color: black;
}

</style>

</head>

<body>

<div class="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

    <div class="menu-label">Advanced Tools</div>
    <a href="calc.html">Wealth Calculators</a>
    <a href="clock.html">Market Clock</a>

    <div class="menu-label">Our Firm</div>
    <a href="aboutus.html">About Us</a>
    <a href="vision.html">Vision</a>

    <div class="menu-label">Research</div>
    <a href="researchportal.html">Research Portal</a>

    <div class="menu-label">Access</div>
    <a href="contactus.html">Contact Us</a>

</div>

<!-- NAV -->
<div class="nav">

    <div onclick="toggleMenu()" class="menu-icon">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <img src="logo.png" height="35">

</div>

<!-- CONTENT -->
<div class="hero">
    <h1>Who We Are</h1>
    <p>Markets are structured systems, not randomness.</p>
</div>

<div class="section">
    <div class="card">We decode market behavior into clarity.</div>
    <div class="card">We focus on structure, not hype.</div>
</div>

<div class="section">
    <button class="btn" onclick="window.location='index.html'">Back Home</button>
</div>

<script>
function toggleMenu()
{
    document.getElementById("sidebar").classList.toggle("open");
    document.querySelector(".overlay").classList.toggle("show");
}
</script>

</body>
</html>
