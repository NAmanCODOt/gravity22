<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gRaviTy Research | Understanding Market Forces</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap');

:root {
    --gold: #d4af37;
    --bg: #050505;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: #050505;
    overflow-x: hidden;
    transition: 0.4s;
    padding-top: 80px;
    z-index: 1000;
    border-right: 1px solid rgba(212,175,55,0.2);
}

.sidebar.open { width: 260px; }

.sidebar a {
    display: block;
    padding: 15px 30px;
    color: #888;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    color: var(--gold);
    padding-left: 40px;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: var(--gold);
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.menu-icon {
    cursor: pointer;
}

.menu-icon span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    margin: 4px 0;
}

/* HERO */
.hero {
    text-align: center;
    padding: 140px 20px;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    color: var(--gold);
}

.hero p {
    max-width: 600px;
    margin: 20px auto;
    color: #999;
}

/* BUTTONS */
.btn {
    padding: 12px 25px;
    margin: 10px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: var(--gold);
    color: black;
}

/* ORBS */
.gold-orb {
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(212,175,55,0.2), transparent);
    border-radius: 50%;
    filter: blur(80px);
    z-index: 0;
}

.orb1 { top: 10%; left: 10%; }
.orb2 { bottom: 10%; right: 10%; }

body > * {
    position: relative;
    z-index: 1;
}
</style>
</head>

<body>

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <span class="close-btn" onclick="closeMenu()">&times;</span>

    <a href="insights.html">Market Insights</a>
    <a href="calc.html">Wealth Projection</a>
    <a href="clock.html">Market Clock</a>
    <a href="aboutus.html">About Us</a>
</div>

<!-- NAV -->
<div class="nav">
    <div class="menu-icon" onclick="openMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <img src="logo.png" height="40">
</div>

<!-- HERO -->
<div class="hero">
    <h1>Decoding Market Forces</h1>
    <p>
        Markets are not random. They move with patterns, logic, and hidden forces.
        We break down complexity into clarity.
    </p>

    <button class="btn" onclick="go('insights.html')">Explore Insights</button>
    <button class="btn" onclick="go('calc.html')">Wealth Tools</button>
</div>

<script>
function openMenu() {
    document.getElementById("sidebar").classList.add("open");
}

function closeMenu() {
    document.getElementById("sidebar").classList.remove("open");
}

function go(page) {
    window.location.href = page;
}
</script>

</body>
</html>
