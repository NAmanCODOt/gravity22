<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Tools | gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');

:root {
    --gold: #d4af37;
    --bg: #050505;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: rgba(5,5,5,0.95);
    backdrop-filter: blur(20px);
    overflow-x: hidden;
    transition: 0.4s;
    padding-top: 80px;
    z-index: 1000;
    border-right: 1px solid rgba(212,175,55,0.2);
}
.sidebar.open { width: 280px; }

.sidebar-content {
    padding: 0 30px;
}

.menu-label {
    margin-top: 25px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.7;
}

.sidebar a {
    display: block;
    padding: 14px 0;
    color: #888;
    text-decoration: none;
    transition: 0.3s;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.sidebar a:hover {
    color: var(--gold);
    padding-left: 10px;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: var(--gold);
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.menu-icon span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    margin: 4px 0;
}

.nav img {
    cursor: pointer;
}

/* ORBS */
.gold-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    opacity: 0.15;
}
.orb1 { width:400px;height:400px;background:var(--gold);top:-10%;left:-10%; }
.orb2 { width:300px;height:300px;background:var(--gold);bottom:-5%;right:-5%; }

body > * { position: relative; z-index: 1; }

/* CONTAINER */
.container {
    max-width: 600px;
    margin: auto;
    padding: 40px 20px;
}

h1 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    text-align: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid #222;
    padding: 25px;
    margin-top: 30px;
}

label {
    font-size: 10px;
    color: #777;
}

input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: var(--gold);
    padding: 8px 0;
    margin-bottom: 15px;
}

.result {
    margin-top: 15px;
    font-size: 22px;
    color: var(--gold);
}

/* BUTTON */
.btn {
    margin-top: 30px;
    padding: 10px 20px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
}
.btn:hover {
    background: var(--gold);
    color: black;
}

/* INFO */
.info-toggle {
    margin-top: 10px;
    cursor: pointer;
    color: var(--gold);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.arrow { transition: 0.3s; }
.arrow.rotate { transform: rotate(180deg); }

.info-box {
    max-height: 0;
    overflow: hidden;
    transition: 0.4s ease;
    color: #aaa;
    font-size: 13px;
}

.info-box.open {
    max-height: 300px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<!-- SIDEBAR -->

    <div class="sidebar-content">

        <div class="menu-label">Advanced Tools</div>
        <a href="calc.html">Wealth Calculators</a>
        <a href="clock.html">Market Clock</a>

        <div class="menu-label">Our Firm</div>
        <a href="aboutus.html">About Us</a>
        <a href="vision.html">Our Vision</a>

    </div>
</div>

<!-- NAV -->
<div class="nav">
    <div class="menu-icon" onclick="openMenu()">
        <span></span><span></span><span></span>
    </div>
    <img src="logo.png" height="40" onclick="goHome()">
</div>

</div>

<script>

// SIDEBAR
function openMenu() {
    document.getElementById("sidebar").classList.add("open");
}

function closeMenu() {
    document.getElementById("sidebar").classList.remove("open");
}

document.addEventListener("click", function(e) {
    const sidebar = document.getElementById("sidebar");
    if (!sidebar.contains(e.target) && !e.target.closest(".menu-icon")) {
        sidebar.classList.remove("open");
    }
});

// NAV
function goHome(){
    window.location.href = "index.html";
}

</html>
