<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Tools | gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');

:root {
    --gold: #d4af37;
    --bg: #050505;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow-x: hidden;
}

/* SIDEBAR */
.sidebar {
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: #0a0a0a; /* Solid dark background */
    box-shadow: 2px 0 15px rgba(0,0,0,0.5);
    transition: 0.4s ease-in-out;
    padding-top: 80px;
    z-index: 2000;
    overflow-x: hidden; /* Keeps content hidden when width is 0 */
}

.sidebar.open { 
    width: 280px; 
    border-right: 1px solid var(--gold);
}

.sidebar-content { 
    min-width: 280px; /* Prevents text wrapping during animation */
    padding: 0 30px; 
}

.menu-label {
    margin-top: 25px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
}

.sidebar a {
    display: block;
    padding: 14px 0;
    color: #888;
    text-decoration: none;
    transition: 0.3s;
}
.sidebar a:hover {
    color: var(--gold);
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: var(--gold);
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
}

.menu-icon {
    cursor: pointer;
    padding: 10px;
    z-index: 101;
}

.menu-icon span {
    display: block;
    width: 25px;
    height: 2px;
    background: var(--gold);
    margin: 5px 0;
}

/* CONTAINER */
.container {
    max-width: 600px;
    margin: auto;
    padding: 40px 20px;
}

h1 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    text-align: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid #222;
    padding: 25px;
    margin-top: 30px;
}

label {
    font-size: 11px;
    color: #666;
    display: block;
    margin-top: 10px;
}

input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: var(--gold);
    padding: 8px 0;
    margin-bottom: 15px;
    font-size: 18px;
    outline: none;
}

.result {
    font-size: 22px;
    color: var(--gold);
    margin-top: 10px;
    font-weight: bold;
}

.btn {
    margin-top: 30px;
    padding: 10px 25px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
}
</style>
</head>

<body>

<div id="sidebar" class="sidebar">
    <span class="close-btn" onclick="closeMenu()">&times;</span>
    <div class="sidebar-content">
        <div class="menu-label">Advanced Tools</div>
        <a href="#">Wealth Calculators</a>
        <a href="#">Market Clock</a>

        <div class="menu-label">Our Firm</div>
        <a href="#">About Us</a>
        <a href="#">Our Vision</a>
    </div>
</div>

<div class="nav">
    <div class="menu-icon" onclick="openMenu(event)">
        <span></span><span></span><span></span>
    </div>
    <div style="color: var(--gold); font-size: 20px; font-weight: bold;">gRaviTy</div>
</div>

<div class="container">
    <h1>Wealth Calculators</h1>

    <div class="card">
        <h3>Wealth Projection</h3>
        <label>Principal</label>
        <input id="p" type="number" value="100000" oninput="calc()">
        <label>Monthly Addition</label>
        <input id="m" type="number" value="10000" oninput="calc()">
        <label>Return (%)</label>
        <input id="r" type="number" value="12" oninput="calc()">
        <label>Years</label>
        <input id="y" type="number" value="10" oninput="calc()">
        <div id="res1" class="result">₹ 0</div>
    </div>
</div>

<script>
// SIDEBAR CONTROL
function openMenu(event) {
    event.stopPropagation(); // Stops the click from immediately triggering the "close" script
    document.getElementById("sidebar").classList.add("open");
}

function closeMenu() {
    document.getElementById("sidebar").classList.remove("open");
}

// Close when clicking anywhere outside the sidebar
document.addEventListener("click", function(e) {
    const sidebar = document.getElementById("sidebar");
    const menuIcon = document.querySelector(".menu-icon");
    
    // If the click is NOT on the sidebar and NOT on the menu button, close it
    if (!sidebar.contains(e.target) && !menuIcon.contains(e.target)) {
        closeMenu();
    }
});

// CALCULATOR LOGIC
function calc() {
    const P = parseFloat(document.getElementById("p").value) || 0;
    const M = parseFloat(document.getElementById("m").value) || 0;
    const rateInput = parseFloat(document.getElementById("r").value) || 0;
    const years = parseFloat(document.getElementById("y").value) || 0;

    const r = rateInput / 100 / 12;
    const t = years * 12;

    let val = (r === 0) 
        ? P + (M * t) 
        : P * Math.pow(1 + r, t) + M * ((Math.pow(1 + r, t) - 1) / r) * (1 + r);

    document.getElementById("res1").innerText = "₹ " + Math.round(val).toLocaleString("en-IN");
}

// Run on load
calc();
</script>

</body>
</html>
