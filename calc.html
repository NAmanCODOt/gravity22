<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Calculator | gRaviTy Research</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');
        
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calc-card {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid #d4af37;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
            text-align: center;
        }

        h1 { font-family: 'Playfair Display'; color: #d4af37; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: #d4af37; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        
        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #fff;
            padding: 10px 0;
            font-size: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-bottom-color: #d4af37; }

        .btn-calc {
            width: 100%;
            padding: 15px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-calc:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        .results { margin-top: 35px; border-top: 1px solid #1f1f1f; padding-top: 25px; display: none; }
        .res-val { font-size: 32px; color: #d4af37; font-weight: bold; margin: 10px 0; }
        
        .back-link { display: block; margin-top: 30px; color: #666; text-decoration: none; font-size: 13px; }
        .back-link:hover { color: #d4af37; }
    </style>
</head>
<body>

    <div class="calc-card">
        <img src="logo.png" alt="gRaviTy" style="width: 100px; margin-bottom: 20px;">
        <h1>Wealth Projection</h1>

        <div class="input-group">
            <label>Monthly SIP Amount (₹)</label>
            <input type="number" id="monthly" value="5000">
        </div>

        <div class="input-group">
            <label>Expected Annual Return (%)</label>
            <input type="number" id="rate" value="12">
        </div>

        <div class="input-group">
            <label>Investment Duration (Years)</label>
            <input type="number" id="years" value="10">
        </div>

        <button class="btn-calc" onclick="runCalc()">Calculate Future Value</button>

        <div class="results" id="results">
            <p style="color: #9ca3af; margin: 0;">Total wealth created will be approx:</p>
            <div class="res-val" id="total">₹0</div>
            <p style="font-size: 12px; color: #555;">(Calculation assumes monthly compounding)</p>
        </div>

        <a href="index.html" class="back-link">← Back to Research Home</a>
    </div>

    <script>
        function runCalc() {
            const P = parseFloat(document.getElementById('monthly').value);
            const i = (parseFloat(document.getElementById('rate').value) / 100) / 12;
            const n = parseFloat(document.getElementById('years').value) * 12;

            if(!P || !i || !n) return;

            // SIP Formula: M = P × ({[1 + i]^n – 1} / i) × (1 + i)
            const fv = P * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);

            document.getElementById('total').innerText = "₹" + Math.round(fv).toLocaleString('en-IN');
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
