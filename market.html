<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard | gRaviTy</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    /* --- SIDEBAR NAVIGATION --- */
.sidebar {
    height: 100%;
    width: 0;
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    background-color: rgba(10, 10, 10, 0.98);
    backdrop-filter: blur(15px);
    overflow-x: hidden;
    transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
    padding-top: 60px;
    border-right: 1px solid #1f1f1f;
}

.sidebar a {
    padding: 15px 32px;
    text-decoration: none;
    font-size: 18px;
    color: #9ca3af;
    display: block;
    transition: 0.3s;
    font-weight: 300;
    white-space: nowrap;
}

.sidebar a:hover { color: #d4af37; padding-left: 40px; }

.sidebar .close-btn {
    position: absolute;
    top: 15px;
    right: 25px;
    font-size: 36px;
    cursor: pointer;
    color: #d4af37;
}

.menu-label {
    padding: 10px 32px;
    font-size: 11px;
    color: #d4af37;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 20px;
}

/* --- MENU ICON --- */
.menu-icon {
    cursor: pointer;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.menu-icon span {
    display: block;
    width: 5px;
    height: 5px;
    background-color: #d4af37;
    border-radius: 50%;
    transition: 0.3s;
}

.menu-icon:hover span { transform: scale(1.4); background-color: #fff; }
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #020617;
    color: #e2e8f0;
}

/* NAV */
.nav {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
    color: #38bdf8;
}

/* CONTAINER */
.container {
    padding: 40px 20px;
    max-width: 1000px;
    margin: auto;
}

/* CARD */
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 25px;
}

/* BULL BEAR BAR */
.bar {
    height: 25px;
    background: #334155;
    border-radius: 10px;
    overflow: hidden;
}

.bull {
    height: 100%;
    width: 65%;
    background: #22c55e;
}

.bear {
    height: 100%;
    width: 35%;
    background: #ef4444;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.box {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="nav">gRaviTy Market Dashboard</div>

<div class="container">

    <!-- Bull vs Bear -->
    <div class="card">
        <h2>Bull vs Bear Sentiment</h2>
        <p>Bulls dominating current market momentum</p>

        <div class="bar">
            <div class="bull"></div>
        </div>

        <div class="bar" style="margin-top:10px;">
            <div class="bear"></div>
        </div>

        <p style="margin-top:10px;">🟢 Bulls: 65% | 🔴 Bears: 35%</p>
    </div>

    <!-- Chart -->
    <div class="card">
        <h2>NIFTY Trend (Simulated)</h2>
        <canvas id="chart"></canvas>
    </div>

    <!-- Sectors -->
    <div class="card">
        <h2>Sector Performance</h2>

        <div class="grid">
            <div class="box">IT 📈 +2.3%</div>
            <div class="box">Banking 📉 -1.2%</div>
            <div class="box">Energy 📈 +3.1%</div>
            <div class="box">Pharma 📈 +1.5%</div>
        </div>
    </div>

</div>

<script>
const ctx = document.getElementById('chart').getContext('2d');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
        datasets: [{
            label: 'NIFTY Movement',
            data: [19500, 19650, 19400, 19700, 19850],
            borderColor: '#38bdf8',
            fill: false
        }]
    }
});
</script>

</body>
</html>
