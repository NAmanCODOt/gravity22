<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | gRaviTy Research</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');
        
        body {
            margin: 0;
            height: 100vh;
            background: #000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- NAVIGATION (Centered Logo) --- */
        .nav {
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(212,175,55,0.1);
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        /* --- CONTENT AREA --- */
        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            color: #d4af37;
            margin-bottom: 10px;
        }

        p {
            color: #9ca3af;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .btn {
            padding: 12px 25px;
            background: transparent;
            border: 1px solid #d4af37;
            border-radius: 8px;
            color: #d4af37;
            text-decoration: none;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #d4af37;
            color: black;
        }

        /* Ambient Background Orb */
        .orb {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212,175,55,0.12), transparent 70%);
            filter: blur(80px);
            z-index: 1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html">
            <img src="logo.png" alt="gRaviTy Logo" style="width:140px;">
        </a>
    </div>

    <div class="main-wrapper">
        <div class="orb"></div>
        
        <div class="container">
            <h1>Coming Soon</h1>
            <p>This feature is currently under development</p>
            <a href="index.html" class="btn">Return Home</a>
        </div>
    </div>

</body>
</html>
