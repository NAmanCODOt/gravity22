<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Market Terminal | gRaviTy Research</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap');
        
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f1f1f;
            background: rgba(10, 10, 10, 0.95);
        }

        .btn-back {
            color: #d4af37;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #d4af37;
            padding: 8px 16px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .btn-back:hover { background: #d4af37; color: #000; }

        .terminal-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #chart-area { flex: 3; border-right: 1px solid #1f1f1f; }
        #quote-area { flex: 1; min-width: 300px; padding: 10px; background: #050505; }

        @media (max-width: 768px) {
            .terminal-container { flex-direction: column; }
            #quote-area { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="gRaviTy" style="width: 120px;">
        <h2 style="font-family: 'Playfair Display'; color: #d4af37; margin: 0; font-size: 18px;">Market Terminal</h2>
        <a href="index.html" class="btn-back">← Exit Terminal</a>
    </div>

    <div class="terminal-container">
        <div id="chart-area">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="tradingview_adv" style="height:100%;width:100%"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "NSE:TATAMOTORS",
                    "interval": "D",
                    "timezone": "Asia/Kolkata",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_top_toolbar": false,
                    "save_image": false,
                    "container_id": "tradingview_adv"
                });
                </script>
            </div>
        </div>

        <div id="quote-area">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                {
                "colorTheme": "dark",
                "dateRange": "12M",
                "showChart": true,
                "locale": "en",
                "largeChartUrl": "",
                "isTransparent": true,
                "showSymbolLogo": true,
                "showFloatingTooltip": false,
                "width": "100%",
                "height": "100%",
                "tabs": [
                    {
                    "title": "Equities",
                    "symbols": [
                        { "s": "NSE:TATAMOTORS" },
                        { "s": "NSE:RELIANCE" },
                        { "s": "NSE:HDFCBANK" },
                        { "s": "NSE:INFY" }
                    ]
                    }
                ]
                }
                </script>
            </div>
        </div>
    </div>

</body>
</html>
