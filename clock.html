<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Clock | gRaviTy Research</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@200;300;400;500;600&display=swap');

        :root {
            --gold: #d4af37;
            --gold-muted: rgba(212, 175, 55, 0.2);
            --bg-black: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-black);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- BACKGROUND ORBS --- */
        .gold-orb { position: fixed; border-radius: 50%; filter: blur(140px); pointer-events: none; z-index: 1; opacity: 0.2; }
        .orb1 { width: 600px; height: 600px; background: var(--gold); top: -10%; left: -10%; }
        .orb2 { width: 500px; height: 500px; background: var(--gold); bottom: -5%; right: -5%; }

        /* --- CLOCK CONTAINER --- */
        .clock-container {
            text-align: center;
            z-index: 10;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: clamp(24px, 5vw, 42px);
            margin-bottom: 40px;
            letter-spacing: 2px;
            font-style: italic;
        }

        .timer-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            font-size: clamp(40px, 12vw, 100px);
            font-weight: 200;
            color: var(--gold);
        }

        .timer-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timer-label {
            font-size: clamp(10px, 2vw, 14px);
            color: #555;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 10px;
            font-weight: 600;
        }

        .separator {
            opacity: 0.3;
            padding-bottom: 30px;
        }

        .back-btn {
            margin-top: 60px;
            padding: 12px 30px;
            border: 1px solid var(--gold-muted);
            color: #888;
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        .back-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }
    </style>
</head>
<body>

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<div class="clock-container">
    <h1>Market Launch Sequence</h1>
    
    <div class="timer-display">
        <div class="timer-unit">
            <span id="days">00</span>
            <span class="timer-label">Days</span>
        </div>
        <span class="separator">:</span>
        <div class="timer-unit">
            <span id="hours">00</span>
            <span class="timer-label">Hours</span>
        </div>
        <span class="separator">:</span>
        <div class="timer-unit">
            <span id="minutes">00</span>
            <span class="timer-label">Minutes</span>
        </div>
        <span class="separator">:</span>
        <div class="timer-unit">
            <span id="seconds">00</span>
            <span class="timer-label">Seconds</span>
        </div>
    </div>

    <p style="color: #444; font-size: 12px; margin-top: 30px; letter-spacing: 1px;">
        TIMEZONE: INDIA STANDARD TIME (IST)
    </p>

    <br>
    <a href="index.html" class="back-btn">Return to Terminal</a>
</div>

<script>
    // FIXED IST TARGET: April 25, 2026 @ 00:00 IST
    const target = new Date("2026-04-25T00:00:00+05:30").getTime();

    function updateClock() {
        const now = new Date().getTime();
        const diff = target - now;

        if (diff <= 0) {
            document.querySelector(".timer-display").innerHTML = "SYSTEMS LIVE";
            return;
        }

        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        document.getElementById("days").innerText = d.toString().padStart(2, '0');
        document.getElementById("hours").innerText = h.toString().padStart(2, '0');
        document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
        document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
    }

    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
