<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Clock | gRaviTy Research</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #d4af37;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* Ambient Background Effect */
        .background-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        /* The Main Digital Clock */
        #clock {
            font-size: clamp(60px, 15vw, 120px);
            font-weight: 200;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .date-display {
            font-size: 18px;
            color: #d4af37;
            margin-bottom: 50px;
            opacity: 0.8;
        }

        /* The Countdown Section */
        .launch-info {
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding-top: 30px;
        }

        .launch-title {
            font-size: 12px;
            margin-bottom: 20px;
            color: #9ca3af;
        }

        .countdown-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .time-box {
            display: flex;
            flex-direction: column;
        }

        .time-val {
            font-size: 32px;
            font-weight: 700;
            color: #d4af37;
        }

        .time-label {
            font-size: 10px;
            color: #4b5563;
            margin-top: 5px;
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 40px;
            left: 40px;
            color: #4b5563;
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
            border-bottom: 1px solid transparent;
        }

        .back-btn:hover {
            color: #d4af37;
            border-color: #d4af37;
        }

        /* Subtle Scanning Line Animation */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 2;
            background: linear-gradient(0deg, rgba(212, 175, 55, 0) 0%, rgba(212, 175, 55, 0.02) 50%, rgba(212, 175, 55, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>
    <div class="scanline"></div>

    <a href="index.html" class="back-btn">← Terminal</a>

    <div class="container">
        <div id="clock">00:00:00</div>
        <div class="date-display" id="date">Loading Market Time...</div>

        <div class="launch-info">
            <div class="launch-title">Grand Launch | April 25, 2026</div>
            <div class="countdown-grid">
                <div class="time-box">
                    <span class="time-val" id="days">00</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-box">
                    <span class="time-val" id="hours">00</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="time-box">
                    <span class="time-val" id="minutes">00</span>
                    <span class="time-label">Minutes</span>
                </div>
                <div class="time-box">
                    <span class="time-val" id="seconds">00</span>
                    <span class="time-label">Seconds</span>
                </div>
            </div>
            <p style="font-size: 9px; margin-top: 40px; color: #374151;">Company: gRaviTy Research | Structural Analysis Division</p>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Format Time
            let h = now.getHours().toString().padStart(2, '0');
            let m = now.getMinutes().toString().padStart(2, '0');
            let s = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;

            // Format Date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);

            // Countdown Logic
            const target = new Date("April 25, 2026 00:00:00").getTime();
            const diff = target - now.getTime();

            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hh = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mm = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const ss = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('days').textContent = d.toString().padStart(2, '0');
                document.getElementById('hours').textContent = hh.toString().padStart(2, '0');
                document.getElementById('minutes').textContent = mm.toString().padStart(2, '0');
                document.getElementById('seconds').textContent = ss.toString().padStart(2, '0');
            } else {
                document.querySelector('.launch-info').innerHTML = "<div class='time-val'>SYSTEMS ACTIVE</div>";
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
