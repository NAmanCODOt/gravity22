<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launch | gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@200;300;400;600&display=swap');

:root {
    --gold: #d4af37;
    --bg: #050505;
}

/* BASE */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow: hidden;
}

/* SIDEBAR */
.sidebar {
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: rgba(5,5,5,0.98);
    backdrop-filter: blur(15px);
    overflow-x: hidden;
    transition: 0.4s ease;
    padding-top: 80px;
    z-index: 1000;
    border-right: 1px solid rgba(212,175,55,0.2);
}

.sidebar.open { width: 260px; }

.sidebar a {
    display: block;
    padding: 15px 30px;
    color: #888;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    color: var(--gold);
    padding-left: 40px;
}

.menu-label {
    padding: 20px 30px 5px;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: var(--gold);
}

/* NAV */
.nav {
    position: absolute;
    top: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    z-index: 10;
}

.menu-icon {
    cursor: pointer;
}

.menu-icon span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    margin: 4px 0;
}

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 2px;
    cursor: pointer;
}

/* GOLD ORBS */
.gold-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(140px);
    pointer-events: none;
    z-index: 1;
    opacity: 0.15;
}

.orb1 {
    width: 600px;
    height: 600px;
    background: var(--gold);
    animation: move1 25s infinite linear;
}

.orb2 {
    width: 500px;
    height: 500px;
    background: var(--gold);
    animation: move2 30s infinite linear;
}

@keyframes move1 {
    0% { top: -10%; left: -10%; }
    50% { top: 60%; left: 70%; }
    100% { top: -10%; left: -10%; }
}

@keyframes move2 {
    0% { bottom: -10%; right: -10%; }
    50% { bottom: 60%; right: 70%; }
    100% { bottom: -10%; right: -10%; }
}

/* MAIN */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    position: relative;
}

/* LABEL */
.label {
    font-size: 11px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 30px;
}

/* TIMER */
.timer {
    display: flex;
    gap: clamp(10px, 4vw, 40px);
    font-size: clamp(60px, 16vw, 160px);
    font-weight: 200;
    color: var(--gold);
}

/* UNIT */
.unit {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.unit-label {
    font-size: 9px;
    letter-spacing: 4px;
    margin-top: 10px;
    color: #555;
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 30px;
    z-index: 10;
}

.footer a {
    color: white;
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 3px;
    border: 1px solid #222;
    padding: 10px 20px;
    transition: 0.3s;
}

.footer a:hover {
    border-color: var(--gold);
    color: var(--gold);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <span class="close-btn" onclick="closeMenu()">&times;</span>

    <div class="menu-label">Advanced Tools</div>
    <a href="calc.html">Wealth Calculators</a>
    <a href="clock.html">Market Clock</a>

    <div class="menu-label">Our Firm</div>
    <a href="vision.html">Our Vision</a>
    <a href="aboutus.html">About Us</a>
</div>

<!-- NAV -->
<div class="nav">
    <div class="menu-icon" onclick="openMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="logo" onclick="goHome()">gRaviTy</div>
</div>

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<!-- MAIN -->
<div class="container">

    <div class="label">Time to Launch</div>

    <div class="timer">

        <div class="unit">
            <span id="days">00</span>
            <div class="unit-label">Days</div>
        </div>

        <div class="unit">
            <span id="hours">00</span>
            <div class="unit-label">Hours</div>
        </div>

        <div class="unit">
            <span id="minutes">00</span>
            <div class="unit-label">Minutes</div>
        </div>

        <div class="unit">
            <span id="seconds">00</span>
            <div class="unit-label">Seconds</div>
        </div>

    </div>

</div>

<div class="footer">
    <a href="index.html">Return to Home</a>
</div>

<script>
// SIDEBAR
function openMenu() {
    document.getElementById("sidebar").classList.add("open");
}

function closeMenu() {
    document.getElementById("sidebar").classList.remove("open");
}

document.addEventListener("click", function(e) {
    const sidebar = document.getElementById("sidebar");
    if (!sidebar.contains(e.target) && !e.target.closest(".menu-icon")) {
        sidebar.classList.remove("open");
    }
});

function goHome(){
    window.location.href = "index.html";
}

// TIMER
const target = new Date("2026-04-25T00:00:00+05:30").getTime();

function updateClock() {
    const now = new Date().getTime();
    const diff = target - now;

    if (diff <= 0) {
        document.querySelector(".timer").innerHTML = "LIVE";
        return;
    }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    document.getElementById("days").innerText = d.toString().padStart(2, '0');
    document.getElementById("hours").innerText = h.toString().padStart(2, '0');
    document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
    document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
