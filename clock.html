<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAVITY | CLOCK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap');

        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            letter-spacing: 0.15em;
        }

        /* Top Corner Meta */
        .meta-header {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 10px;
            color: #444;
            font-weight: 600;
        }

        /* Large Minimal Clock */
        #clock {
            font-size: clamp(80px, 18vw, 160px);
            font-weight: 100;
            margin: 0;
            line-height: 1;
        }

        /* Separator Line */
        .divider {
            width: 40px;
            height: 1px;
            background: #d4af37;
            margin: 40px 0;
            opacity: 0.5;
        }

        /* Countdown */
        .countdown-container {
            display: flex;
            gap: 40px;
            color: #d4af37;
            font-size: 14px;
            font-weight: 300;
        }

        .unit span {
            display: block;
            font-size: 8px;
            color: #444;
            margin-bottom: 8px;
            text-align: center;
        }

        /* Bottom Fixed Info */
        .launch-footer {
            position: absolute;
            bottom: 40px;
            font-size: 11px;
            color: #666;
            text-align: center;
        }

        .back-link {
            position: absolute;
            bottom: 40px;
            left: 40px;
            text-decoration: none;
            color: #222;
            font-size: 10px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #d4af37;
        }

        /* Disable user selection for a cleaner feel */
        * { user-select: none; }
    </style>
</head>
<body>

    <div class="meta-header">SYSTEM_TIME</div>

    <div id="clock">00:00:00</div>

    <div class="divider"></div>

    <div class="countdown-container">
        <div class="unit"><span>DAYS</span><div id="days">000</div></div>
        <div class="unit"><span>HRS</span><div id="hours">00</div></div>
        <div class="unit"><span>MIN</span><div id="minutes">00</div></div>
        <div class="unit"><span>SEC</span><div id="seconds">00</div></div>
    </div>

    <div class="launch-footer">
        GRAVITY RESEARCH | 25.04.2026
    </div>

    <a href="index.html" class="back-link">EXIT</a>

    <script>
        function update() {
            const now = new Date();
            
            // Time
            document.getElementById('clock').textContent = 
                now.getHours().toString().padStart(2, '0') + ":" +
                now.getMinutes().toString().padStart(2, '0') + ":" +
                now.getSeconds().toString().padStart(2, '0');

            // Countdown
            const target = new Date("April 25, 2026 00:00:00").getTime();
            const diff = target - now.getTime();

            if (diff > 0) {
                document.getElementById('days').textContent = Math.floor(diff / 86400000).toString().padStart(3, '0');
                document.getElementById('hours').textContent = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
                document.getElementById('minutes').textContent = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                document.getElementById('seconds').textContent = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
