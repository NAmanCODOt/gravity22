<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launch | gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@200;300;400;600&display=swap');

:root {
    --gold: #d4af37;
    --bg: #050505;
}

/* BASE */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow: hidden;
}

/* GOLD ORBS */
.gold-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(140px);
    pointer-events: none;
    z-index: 1;
    opacity: 0.15;
}

.orb1 {
    width: 600px;
    height: 600px;
    background: var(--gold);
    animation: move1 25s infinite linear;
}

.orb2 {
    width: 500px;
    height: 500px;
    background: var(--gold);
    animation: move2 30s infinite linear;
}

@keyframes move1 {
    0% { top: -10%; left: -10%; }
    50% { top: 60%; left: 70%; }
    100% { top: -10%; left: -10%; }
}

@keyframes move2 {
    0% { bottom: -10%; right: -10%; }
    50% { bottom: 60%; right: 70%; }
    100% { bottom: -10%; right: -10%; }
}

/* NAV (ADDED — fixes your “dry” feel) */
.nav {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    z-index: 10;
}

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 2px;
    position: relative;
}

.logo::after {
    content: "";
    display: block;
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 6px auto 0;
    opacity: 0.5;
}

/* MAIN */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    position: relative;
}

/* LABEL */
.label {
    font-size: 11px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 30px;
    animation: fadeIn 2s ease;
}

/* TIMER */
.timer {
    display: flex;
    gap: clamp(10px, 4vw, 40px);
    font-size: clamp(60px, 16vw, 160px);
    font-weight: 200;
    color: var(--gold);
}

/* UNIT */
.unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: float 4s ease-in-out infinite;
}

.unit span:first-child {
    text-shadow: 0 0 25px rgba(212,175,55,0.25);
}

.unit-label {
    font-size: 9px;
    letter-spacing: 4px;
    margin-top: 10px;
    color: #555;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 0.7; transform: translateY(0); }
}

/* FOOTER NAV */
.footer {
    position: absolute;
    bottom: 30px;
    z-index: 10;
}

.footer a {
    color: white;
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 3px;
    border: 1px solid #222;
    padding: 10px 20px;
    transition: 0.3s;
}

.footer a:hover {
    border-color: var(--gold);
    color: var(--gold);
}
</style>
</head>

<body>

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<div class="nav">
    <div class="logo">gRaviTy Research</div>
</div>

<div class="container">

    <div class="label">Time to Launch</div>

    <div class="timer">

        <div class="unit">
            <span id="days">00</span>
            <div class="unit-label">Days</div>
        </div>

        <div class="unit">
            <span id="hours">00</span>
            <div class="unit-label">Hours</div>
        </div>

        <div class="unit">
            <span id="minutes">00</span>
            <div class="unit-label">Minutes</div>
        </div>

        <div class="unit">
            <span id="seconds">00</span>
            <div class="unit-label">Seconds</div>
        </div>

    </div>

</div>

<div class="footer">
    <a href="index.html">Return to Home</a>
</div>

<script>
const target = new Date("2026-04-25T00:00:00+05:30").getTime();

function updateClock() {
    const now = new Date().getTime();
    const diff = target - now;

    if (diff <= 0) {
        document.querySelector(".timer").innerHTML = "LIVE";
        return;
    }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    document.getElementById("days").innerText = d.toString().padStart(2, '0');
    document.getElementById("hours").innerText = h.toString().padStart(2, '0');
    document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
    document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
